<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Contenu non disponible</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 5vw;
    }

    .main-text {
      color: #fff;
      font-weight: 700;
      font-size: clamp(60px, 5vw, 50px);
      margin-bottom: 12px;
    }

    .sub-text {
      color: #fff;
      opacity: 0.8;
      font-size: clamp(50px, 2.5vw, 40px);
    }
  </style>
</head>

<body>
  <div class="container">
    <div>
      <div class="main-text">
        contenu non disponible pour l'instant
      </div>
      <div class="sub-text">
        Le 1er janvier de l'an zéro novalisien n'a pas encore débuté
      </div>
    </div>
  </div>
</body>
</html>
